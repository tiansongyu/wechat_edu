limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=admin_auth_limit:10m rate=10r/m;

resolver 127.0.0.11 valid=10s ipv6=off;

upstream tutor_api {
  zone tutor_api 64k;
  least_conn;
  server api:3000 resolve;
  keepalive 32;
}

upstream tutor_admin {
  zone tutor_admin 64k;
  server admin-web:80 resolve;
  keepalive 8;
}

upstream tutor_minio {
  zone tutor_minio 64k;
  server minio:9000 resolve;
  keepalive 8;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 12m;

  location = /health {
    proxy_pass http://tutor_api/health;
    proxy_set_header Host $host;
  }

  location = /api/v1/auth/wechat-login {
    limit_req zone=auth_limit burst=10 nodelay;
    proxy_pass http://tutor_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /admin-api/v1/auth/login {
    limit_req zone=admin_auth_limit burst=5 nodelay;
    proxy_pass http://tutor_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    limit_req zone=api_limit burst=60 nodelay;
    proxy_pass http://tutor_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }

  location /admin-api/ {
    limit_req zone=api_limit burst=60 nodelay;
    proxy_pass http://tutor_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }

  location /docs {
    proxy_pass http://tutor_api;
    proxy_set_header Host $host;
  }

  location /socket.io/ {
    proxy_pass http://tutor_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # Keep private certification uploads on the same HTTPS origin as the API.
  # MinIO still enforces the short-lived signature; preserving the public Host
  # header is required for AWS Signature V4 validation.
  location /tutor-link/ {
    proxy_pass http://tutor_minio;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  location / {
    proxy_pass http://tutor_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
